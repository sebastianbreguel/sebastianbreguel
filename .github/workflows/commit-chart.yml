name: update-commit-chart

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: generate chart
        run: uv run scripts/generate_commit_chart.py

      - name: commit svg
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add imgs/commits-2026.svg
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update commit chart"
            git push
          fi
